<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Étudiant</title>
    <link rel="stylesheet" href="../CSS/espace_etudiant.css">
</head>
<body>

    <!-- NAVBAR FIXE -->
    <nav>
        <a href="#accueil">Accueil</a>
        <a href="#modules">Modules</a>
        <a href="#notes">Notes</a>
        <a href="#profil">Profil</a>
    </nav>

    <!-- ACCUEIL -->
    <section id="accueil" class="section">
        <h1>Espace Étudiant</h1>
        <p>Bienvenue sur votre dashboard</p>
    </section>

    <!-- MODULES -->
    <section id="modules" class="section dashboard">
        <h2>Modules</h2>
        <div class="grid">
            <div class="box">Mathématiques</div>
            <div class="box">Informatique</div>
            <div class="box">Physique</div>
            <div class="box">Anglais</div>
        </div>
    </section>

    <!-- NOTES -->
    <section id="notes" class="section dashboard">
        <h2>Notes</h2>
        <div class="grid">
            <div class="box">Math : 15/20</div>
            <div class="box">Info : 17/20</div>
            <div class="box">Physique : 14/20</div>
            <div class="box">Anglais : 16/20</div>
        </div>
    </section>

    <!-- PROFIL -->
    <section id="profil" class="section dashboard">
        <h2>Profil</h2>
        <div class="grid">
            <div class="box">Nom : Étudiant</div>
            <div class="box">Filière : Informatique</div>
            <div class="box">Niveau : 1ère année</div>
        </div>
    </section>

</body>
</html>
