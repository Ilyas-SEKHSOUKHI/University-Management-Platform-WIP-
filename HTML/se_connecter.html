<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="icon" type="image/png" href="../Images/University_icon.png">
    <!-- Lien CSS -->
    <link rel="stylesheet" href="../CSS/se_connecter.css">
</head>

<body>

    <div class="container">
        <form class="form">

            <!-- Image -->
            <img src="../Images/Profile.png" alt="avatar" class="avatar">

            <h2>Se connecter</h2>

            <!-- Email -->
            <div class="row">
                <div class="input_group">
                    <label>Email</label>
                    <input type="email" placeholder="Votre email" required>
                </div>
            </div>

            <!-- Password -->
            <div class="row">
                <div class="input_group">
                    <label>Mot de passe</label>
                    <input type="password" placeholder="Mot de passe" required>
                </div>
            </div>

            <!-- Bouton -->
            <button type="submit">Entrer</button>

            <!-- Liens -->
            <div class="link">
                <a href="#">Mot de passe oublié ?</a><br>
                <a href="#">S'inscrire</a>
            </div>

        </form>
    </div>

    <div>
        <button id="Dark_Mode_click" onclick="DarkMode()">
            Dark Mode
        </button>
    </div>

    <script src="../JavaScript/se_connecter.js"></script>

</body>
</html>
